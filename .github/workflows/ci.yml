name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate source and distribution
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: Shell script syntax
        run: bash -n scripts/*.sh

      - name: Python script syntax
        run: python3 -m py_compile scripts/generate_onehand_t9_dict.py

      - name: Guard signing secrets
        run: |
          if git ls-files | grep -Ei '(^|/)(AuthKey_.*\.p8|.*\.(p12|pfx|cer|crt|pem|key|mobileprovision|provisionprofile|developerprofile))$'; then
            echo "Signing credential or private key file found in checkout." >&2
            exit 1
          fi

      - name: Build pinned universal librime
        run: make build-vendored-librime

      - name: Rime ABI truncation guard
        run: make test-rime-abi

      - name: C bridge warnings are errors
        run: >-
          xcrun clang -std=c11 -Wall -Wextra -Wpedantic -Werror
          -I Sources/CRimeBridge/include -c Sources/CRimeBridge/CRimeBridge.c
          -o /tmp/CRimeBridge.o

      - name: SwiftPM tests
        run: make test

      - name: Warnings are errors
        run: swift build -Xswiftc -warnings-as-errors

      - name: Xcode package tests
        run: make xcodebuild-test

      - name: Dictionary generator smoke test
        run: |
          python3 scripts/generate_onehand_t9_dict.py scripts/sample_pinyin.tsv > /tmp/onehand_t9.dict.yaml
          grep -F "你好	64'426	1000" /tmp/onehand_t9.dict.yaml

      - name: Production dictionary is reproducible
        run: |
          python3 scripts/generate_onehand_t9_dict.py \
            vendor/librime/data/minimal/luna_pinyin.dict.yaml \
            --supplement data/onehand_t9_phrases.tsv \
            > /tmp/onehand_t9-production.dict.yaml
          cmp data/onehand_t9.dict.yaml /tmp/onehand_t9-production.dict.yaml

      - name: Build and inspect universal DMG
        run: |
          make build-dmg
          make test-prebuilt-rime
          make test-install-transactions
          make verify-distribution

      - name: Guard distributable artifacts
        run: |
          if git ls-files | grep -Ei '\.(dmg|pkg|xcarchive)$'; then
            echo "Distributable artifact was committed to the source checkout." >&2
            exit 1
          fi
